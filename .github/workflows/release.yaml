name: Release
on:
  push:
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./plus-ms-report
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/plus-ms-report:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/plus-ms-report:latest
