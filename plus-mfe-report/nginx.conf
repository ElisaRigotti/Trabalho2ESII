server {
    listen 4009;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Module Federation precisa que o Shell (em outra porta/origem)
    # consiga buscar o remoteEntry.js via fetch/import — sem CORS,
    # o navegador bloqueia o carregamento do remote.
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
